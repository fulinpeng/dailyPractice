<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <script src="../js/jquery-3.2.1.min.js"></script>
    <style>
        .contenteditable {
            width: 300px;
            height: 200px;
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <div contenteditable="true" id="editor" class="contenteditable">
        用Safari打开，粘贴图片到此处
    </div>
    <script>
        // Safari的粘贴不是通过event传递的，它是直接在输入框里面添加一张图片
        // 为了获取本地的blob数据，我们可以用ajax发个本地的请求
        $("#editor").on("paste", function (event) {
            // 需要setTimeout 0等图片出来了再处理
            setTimeout(() => {
                let img = $(this).find("img")[0];
                // 用一个xhr获取blob数据
                let xhr = new XMLHttpRequest();
                xhr.open("GET", img.getAttribute('src'));
                // 改变mime类型
                xhr.responseType = "blob";
                xhr.onload = function () {
                    // response就是一个Blob对象
                    console.log('blob', this.response);
                };
                xhr.send();
            }, 0);
        });
    </script>
</body>

</html>
