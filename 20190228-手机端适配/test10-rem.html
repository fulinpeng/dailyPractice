<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- 必须设置多方比例为1 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .test {
            width:19.1rem;
            height:4.8rem;
            font-size:3.4rem;
            line-height:4.8rem;
            color:#333;
            border: 1px solid steelblue;
        }
    </style>
</head>

<body>
    <div class="test">这是一段测试文字</div>
    <script>
        var fontSizeAuto = function (uiW) {
            return function () {
                var screenW = document.documentElement.clientWidth;
                var k = 10 * screenW / 375; // 375 为测试机的逻辑像素宽
                var htmlFontSize = screenW * devicePixelRatio / uiW * k;
                document.documentElement.style.fontSize = htmlFontSize + 'px';
            }
        }
        var fontSizeAutoFn = fontSizeAuto(750);
        fontSizeAutoFn();
        window.onresize = fontSizeAutoFn;
        var i = 1;
    </script>
</body>

</html>
