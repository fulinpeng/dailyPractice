<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>

<body>
    <script>
        // 一段网上的 promise 代码
        var PENDING = 0;
        var FULFILLED = 1;
        var REJECTED = 2;
        function Promise(callback) {
            this.status = PENDING;
            this.value = null;
            this.defferd = [];
            // 不知道setTimeout 在这里的意义？？
            setTimeout(callback.bind(this, this.resolve.bind(this), this.reject.bind(this)), 0);
        }
        Promise.prototype = {
            constructor: Promise,
            resolve: function (result) {
                this.status = FULFILLED;
                this.value = result;
                this.done();
            },
            reject: function (error) {
                this.status = REJECTED;
                this.value = error;
            },
            handle: function (fn) {
                if (!fn) {
                    return;
                }
                var value = this.value;
                var t = this.status;
                var p; // 将then方法中返回的promise对象保存起来
                if (t == PENDING) {
                    this.defferd.push(fn);
                } else {
                    if (t == FULFILLED && typeof fn.onfulfiled == 'function') {
                        p = fn.onfulfiled(value);
                    }
                    if (t == REJECTED && typeof fn.onrejected == 'function') {
                        p = fn.onrejected(value);
                    }
                    var promise = fn.promise;
                    // p 是执行了then的两个参数回调函数后返回的promise（有可能不是promise，它什么都没返回就是undefined），fn.promise是空的promise
                    // 但是 fn.promise 是一定存在的了，而且肯定是个promise，p可能不存在嘛
                    if (promise) {
                        if (p && p.constructor == Promise) {
                            // 是promise就讲目前的defferd拿过来继续用？？？
                            p.defferd = promise.defferd;
                        } else {
                            // 不是promise就把当前的（状态已经改变了的）promise拿过来，病立即执行done()
                            p = this;
                            p.defferd = promise.defferd;
                            this.done();
                        }
                    }
                }
            },
            done: function () {
                // done 会执行整个defferd的promise，而handle是执行单个了
                // 所以done和handle并不冲突，只要不push到defferd中去，是不会被执行两次的
                var status = this.status;
                if (status == PENDING) {
                    return;
                }
                var defferd = this.defferd;
                for (var i = 0; i < defferd.length; i++) {
                    this.handle(defferd[i]);
                }
            },
            then: function (success, fail) {
                var o = {
                    onfulfiled: success,
                    onrejected: fail,
                    promise : new this.constructor(function () { })
                };
                var status = this.status;
                if (status == PENDING) {
                    this.defferd.push(o);
                } else if (status == FULFILLED || status == REJECTED) {
                    // 调用then方法前，promise的状态就变成了FULFILLED、REJECTED，异步执行成功了，done也已经被调用了
                    // 那就直接调用 handle
                    this.handle(o);
                }
                // 为了链式调用，每次then执行完毕，都要返回一个promise对象
                return o.promise;
            }
        };
    </script>
</body>

</html>
