<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>MyPromise</title>
</head>

<body>
    <script>

        var PENDING = 'PENDING';
        var FULFILLED = 'FULFILLED';
        var REJECTED = 'REJECTED';
        function MyPromise(callBack) {
            this.status = PENDING;
            this.value = '';
            this.defferd = [];
            // callBack(this.resolve); // 直接执行的话，resolve函数 还未赋值
            setTimeout(callBack.bind(this, this.resolve.bind(this)), 0);
            // 异步操作执行成功，会调用 this.resolve 方法
        }
        MyPromise.prototype.then = function (resolve) {
            let o = {
                onResolve : resolve,
                promise : new this.constructor(function () { })
            };
            let status = this.status;
            if (status === PENDING) {
                this.defferd.push(o);
            } else {
                this.handle(o);
            }
            return o.promise;
        }
        // resolve 只用来改变promise的状态，和储存数据
        MyPromise.prototype.resolve = function (data) {
            this.status = FULFILLED;
            this.value = data;
            this.done();
        }
        // 处理多条 defferd
        MyPromise.prototype.done = function () {
            if (this.status === PENDING) return;
            var defferd = this.defferd;
            for (var i=0; i < defferd.length; i++) {
                this.handle(defferd[i]);
            }
        }
        // 处理单条 defferd
        MyPromise.prototype.handle = function (o) {
            if (!o) return;
            let value = this.value;
            let status = this.status;
            let p; // 用来接收回调函数的返回值，一般是一个promise
            if (status === PENDING) {
                this.defferd.push(o);
            } else {
                if (o.onResolve && typeof o.onResolve === 'function') {
                    p = o.onResolve(value); // 此时才真正的调用then里面定义的回调，并将异步处理结果通过这种方式返回出去
                }
            }
            // 下面的就不理解了，怎么加上就可以实现链式调用then方法呢
            if (p && p.constructor === MyPromise) {
                console.log('p:', p);
                console.log('o:', o.promise);
                p.defferd = o.promise.defferd;
            } else {
                console.log('else', p);
            }
        }
        var MyPromiseTest = new MyPromise(function (resolve, reject) {
            setTimeout(function () {
                resolve('第一个promise');
            }, 1000);
        });
        MyPromiseTest.then(function (data) {
            console.log('resolve1:', data);
            return new MyPromise(function (resolve) {
                resolve('第二个promise');
                // setTimeout(function () {
                //     resolve('第二个promise');
                // }, 1000);
            });
        }).then(function (data) {
            console.log('resolve2:', data);
        });
    </script>
</body>

</html>
