<body>
    <script>

        var PENDING = 'PENDING';
        var FULFILLED = 'FULFILLED';
        var REJECTED = 'REJECTED';

        function MyPromise(callBack) {
            this.status = PENDING;
            this.value = '';
            this.defferd = [];
            // callBack(this.resolve); // 直接执行的话，resolve函数 还未赋值
            setTimeout(callBack.bind(this, this.resolve.bind(this)), 0);
            // 异步操作执行成功，会调用 this.resolve 方法
        }

        MyPromise.prototype.then = function (resolve) {
            let o = {
                onfulfilled : resolve,
                promise : new this.constructor(function () { })
            };
            let status = this.status;
            if (status === PENDING) {
                this.defferd.push(o);
            } else {
                this.handle(o);
            }
            return o.promise;
        }
        // resolve 只用来改变promise的状态，和储存数据
        MyPromise.prototype.resolve = function (data) {
            this.status = FULFILLED;
            this.value = data;
            this.done();
        }
        // 处理多条 defferd
        MyPromise.prototype.done = function () {
            if (this.status === PENDING) return;
            var defferd = this.defferd;
            for (var i=0; i < defferd.length; i++) {
                this.handle(defferd[i]);
            }
        }
        // 处理单条 defferd
        MyPromise.prototype.handle = function (o) {
            if (!o) return;
            let value = this.value;
            let status = this.status;
            let p; // 用来接收回调函数的返回值，一般是一个promise
            if (status === PENDING) {
                this.defferd.push(o);
            } else {
                if (o.onfulfilled && typeof o.onfulfilled === 'function') {
                    p = o.onfulfilled(value); // 此时才真正的调用then里面定义的回调，并将异步处理结果通过这种方式返回出去
                }
            }
            // 。。。
        }
        var MyPromiseTest = new MyPromise(function (resolve, reject) {
            setTimeout(function () {
                resolve('ha ha ha !!!');
            }, 3000);
        });

        MyPromiseTest.then(function (data) {
            console.log('resolve', data);
        });


















        var PENDING = 0;
        var FULFILLED = 1;
        var REJECTED = 2;
        function Promise(callback) {
            this.status = PENDING;
            this.value = null;
            this.defferd = [];
            setTimeout(callback.bind(this, this.resolve.bind(this), this.reject.bind(this)), 0);
        }
        Promise.prototype = {
            constructor: Promise,
            resolve: function (result) {
                this.status = FULFILLED;
                this.value = result;
                this.done();
            },
            reject: function (error) {
                this.status = REJECTED;
                this.value = error;
            },
            handle: function (fn) {
                if (!fn) {
                    return;
                }
                var value = this.value;
                var t = this.status;
                var p;
                if (t == PENDING) {
                    this.defferd.push(fn);
                } else {
                    if (t == FULFILLED && typeof fn.onfulfiled == 'function') {
                        p = fn.onfulfiled(value);
                    }
                    if (t == REJECTED && typeof fn.onrejected == 'function') {
                        p = fn.onrejected(value);
                    }
                    var promise = fn.promise;
                    if (promise) {
                        if (p && p.constructor == Promise) {
                            p.defferd = promise.defferd;
                        } else {
                            p = this;
                            p.defferd = promise.defferd;
                            this.done();
                        }
                    }
                }
            },
            done: function () {
                var status = this.status;
                if (status == PENDING) {
                    return;
                }
                var defferd = this.defferd;
                for (var i = 0; i < defferd.length; i++) {
                    this.handle(defferd[i]);
                }
            },
            then: function (success, fail) {
                var o = {
                    onfulfiled: success,
                    onrejected: fail
                };
                var status = this.status;
                o.promise = new this.constructor(function () { });
                if (status == PENDING) {
                    this.defferd.push(o);
                } else if (status == FULFILLED || status == REJECTED) {
                    this.handle(o);
                }
                return o.promise;
            }
        };



    </script>
</body>
