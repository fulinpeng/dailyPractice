<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>动态规划与贪心算法</title>
</head>

<body>
    <script>
        // 我们有1，5，10，25面额的硬币，如果要找36面额的钱，要如何实现最少硬币找零？
        // 答案是一个25，一个10，一个1

        /**
         * @description: 使用动态规划实现最少硬币找零
         * @param {coins 有多少种面额的钱币}
         * @return: 
         */
        function MinCoinChange(coins) {
            // 缓存结果集的变量对象
            var cache = {};
            // 定义一个构造函数的私有方法，
            this.makeChange = function (amount) {
                var me = this;
                if (amount <= 0) {
                    return [];
                };

                // cache[amount]的判断是为了在重复计算前面已经计算过的结果时可以直接返回结果
                if (cache[amount]) {
                    return cache[amount];
                };
                // min用来存储最终结果的数组，newMin和newAmount分别是在逻辑的执行过程中，用于存储当前的符合条件的找零数组和找零钱数的。
                var min = [], newMin, newAmount;
                // 我们循环coins的长度。通过循环，我们为每一个conis数组中的面额都进行下面的逻辑操作。（主要是为当前coin做递归）
                for (var i = 0; i < coins.length; i++) {
                    // 选择coins中的当前面额。
                    var coin = coins[i];
                    // 我们用要找零的钱数减去当前要找零的面额。并存储为newAmount变量。
                    newAmount = amount - coin;
                    if (newAmount > 0) {
                        newMin = me.makeChange(newAmount);
                        min = newMin.concat([coin]);
                        return (cache[amount] = min);
                    } else if (newAmount == 0) {
                        min = [coin];
                        return (cache[amount] = min);
                    } else {
                        // 小于0不做处理，min为空数组
                    }
                    // if (newAmount >= 0) {
                    //     newMin = me.makeChange(newAmount);
                    // }
                    // if (newAmount >= 0 && (newMin.length < min.length - 1 || !min.length) && (newMin.length || !newAmount)) {
                    //     min = [coin].concat(newMin);
                    // }
                };
                //cache存储了1到amount之间的所有结果
                //console.log(cache)
                return (cache[amount] = min);
            };
        };

        var minCoinChange = new MinCoinChange([25, 10, 5, 1]);
        console.log(minCoinChange.makeChange(36))
    </script>
</body>

</html>
