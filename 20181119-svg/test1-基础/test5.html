            stroke: #393853;
        }

        .line_wrap circle {
            fill: #1A1A25;
            stroke: #393853;
        }

        .line_wrap .arrow {

        }
        .line_wrap:hover path  {
            stroke: #42BFFD;
        }
        .line_wrap:hover circle {
            fill: #42BFFD;
            stroke: #42BFFD;
        }
        .line_wrap:hover .arrow {
            fill: #42BFFD;
            stroke: none;
        }

        

        .node {
            fill: none;
        }

        .node .node_point {
            fill: #1A1A29;
            stroke: #393853;
        }

        .node text {
            fill: #dbe2ea;
            dominant-baseline: middle;
            text-anchor: middle;
            font-size: 14px;
        }

    <script>
        const svg = document.getElementById('link-svg');
        const linesWrap = svg.getElementById('lines-wrap');
        const nodesWrap = svg.getElementById('nodes-wrap');

        function Line(data) {
            this.data = data;
            this.wrap = document.createElementNS("http://www.w3.org/2000/svg", 'g');
            this.arc = document.createElementNS("http://www.w3.org/2000/svg", 'circle');
            this.line = document.createElementNS("http://www.w3.org/2000/svg", 'path');
            this.line.setAttribute('class', 'line');
            this.arrow = document.createElementNS("http://www.w3.org/2000/svg", 'path');
            this.arrow.setAttribute('class', 'arrow');
        }

        Line.prototype = {
            constructor: Line,
            init: function () {
                this.setStyle();
                this.setClass();
                this.setLine();
                this.setArc();
                this.setArrow();
            },
            setStyle: function () {
                let style = this.data.style || null;
                if (!style) return;
                for (let k in style) {
                    this.wrap.setAttribute(k, style[k]);
                }
            },
            setClass: function () {
                let extraClass = `line_wrap ${this.data.extraClass || ''}`;
                this.wrap.setAttribute('class', extraClass || '');
            },
            setLine: function () {
                let {start,end} = this.data.point;
                let disx = end.x-start.x;
                let disy = end.y-start.y;
                let r = 5;
                if (disy < 20) {
                    console.log('line端点的高度差小于了20');
                }
                if (disx >= 10) {
                    this.line.setAttribute('d', `M${start.x},${start.y}v${(disy)/2-r}a5,5,0,0,0,5,5h${disx-10}a5,5,0,0,1,5,5L${end.x},${end.y}`);
                } else if (disx >= 0 && disx < 10) {
                    r = parseInt(disx/2);
                    this.line.setAttribute('d', `M${start.x},${start.y}v${(disy)/2-r}a${r},${r},0,0,0,${r},${r}h${disx-2*r}a${r},${r},0,0,1,${r},${r}L${end.x},${end.y}`);
                } else if (disx < 0 && disx > -10) {
                    r = Math.abs(parseInt(disx/2));
                    this.line.setAttribute('d', `M${start.x},${start.y}v${(disy)/2-r}a${r},${r},0,0,1,${-r},${r}h${disx+2*r}a${r},${r},0,0,0,${-r},${r}L${end.x},${end.y}`);                    
                } else if (disx <= -10) {
                    this.line.setAttribute('d', `M${start.x},${start.y}v${(disy)/2-r}a${r},${r},0,0,1,${-r},${r}h${disx+2*r}a${r},${r},0,0,0,${-r},${r}L${end.x},${end.y}`);
                }
                this.wrap.appendChild(this.line);
            },
            setArc: function () {
                let point = this.data.point;
                this.arc.setAttribute('cx', `${point.start.x}`);
                this.arc.setAttribute('cy', `${point.start.y}`);
                this.arc.setAttribute('r', 5);
                this.wrap.appendChild(this.arc);
            },
            setArrow: function () {
                let point = this.data.point;
                this.arrow.setAttribute('d', `M${point.end.x},${point.end.y} l6,-7 l-12,0 z`);
                this.wrap.appendChild(this.arrow);
            },
        }

        function TextNode(data) {
            this.style = data.style || null;
            this.point = data.point;
            this.extraClass = data.extraClass || '';
            this.position = data.position;
            this.circle = data.circle;
            this.path = data.path;
            this.text = data.text;

            this.wrap = document.createElementNS("http://www.w3.org/2000/svg", 'g');
            this.g_path = document.createElementNS("http://www.w3.org/2000/svg", 'path');
            this.g_text = document.createElementNS("http://www.w3.org/2000/svg", 'text');

            this.data = data;
        }
        TextNode.prototype = {
            constructor: TextNode,
            init: function () {
                this.setStyle();
                this.setPath();
                this.setClass();
                this.move();
                this.setPath();
                this.setCircle();
                this.setText();
            },
            setStyle: function () {
                let style = this.style;
                for (let k in style) {
                    this.wrap.setAttribute(k, style[k]);
                }
            },
            setClass: function () {
                this.wrap.setAttribute('class', `node ${this.extraClass || ''}`);
            },
            move: function () {
                this.wrap.setAttribute('transform', `matrix( 1 0 0 1 ${this.position || '0 0'} )`);
                // this.wrap.setAttribute('d', `M${this.point.start} A334,144,0,0,0,${this.point.end}`);
            },
            setPath: function () {
                let path = this.path;
                for (let k in path) {
                    this.g_path.setAttribute(k, path[k]);
                }
                this.g_path.setAttribute('d', `M100,100 h180 a20,20,0,0,1,0,40 h-180 a20,20,0,0,1,0,-40 z`);
                this.wrap.appendChild(this.g_path);
            },
            setCircle: function () {
                let circle = this.circle;
                for (let i = 0; i < circle.length; i++) {
                    let g_circle = document.createElementNS("http://www.w3.org/2000/svg", 'circle');
                    g_circle.setAttribute('class', 'node_point');
                    for (let j in circle[i]) {
                        g_circle.setAttribute(j, circle[i][j]);
                    }
                    this.cricleAddEvent(g_circle, { x: 130, y: 140 });
                    this.wrap.appendChild(g_circle);
                }
            },
            setText: function () {
                this.g_text.setAttribute('x', this.text.position.x);
                this.g_text.setAttribute('y', this.text.position.y);
                this.g_text.innerHTML = this.text.text;
                this.wrap.appendChild(this.g_text);
            },
            cricleAddEvent : function (circle, start) {
                const line = new Line({
                    extraClass: '',
                    style: {
                    },
                    point: {
                        start: start,
                        end: { x: 200, y: 300 },
                    }
                });
                line.init();
                linesWrap.appendChild(line.wrap);
                circle.addEventListener('click', function (e) {
                    arrowFllowMouse(e, line);
                });
            }
        }

        const line2 = new Line({

            },

        node2.init();
        linesWrap.appendChild(line2.wrap);
        nodesWrap.appendChild(node1.wrap);
        nodesWrap.appendChild(node2.wrap);

        function arrowFllowMouse(e, target) {
            let {start} = target.data.point;
            let x1 = e.pageX;
            let y1 = e.pageY;
            console.log(x1, y1);
            function docOnmousemove(e) {
                let x2 = e.pageX;
                let y2 = e.pageY;
                let disx = x2 - x1;
                let disy = y2 - y1;
                target.data = {
                    ...target.data,
                    point: {
                        ...target.data.point,
                        end: {
                            x: start.x + disx,
                            y: start.y + disy
                        },
                    }
                };
                target.init();
            }
            function docOnmouseup() {
                document.removeEventListener('mousemove', docOnmousemove);
                document.removeEventListener('mouseup', docOnmouseup);
            }
            document.addEventListener('mousemove', docOnmousemove);
            document.addEventListener('mouseup', docOnmouseup);
        }
