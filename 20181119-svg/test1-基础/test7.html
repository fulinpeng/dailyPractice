<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title></title>
  <style type="text/css">
    html {
      height: 100%;
    }

    body {
      margin: 0;
      padding: 0;
    }

    svg {
      width: 300px;
      height: 150px;
    }

    path {
      fill: #4682B4;
    }

    text {
      stroke: #fff;
      stroke-width: 1;
      font-size: 20px;

      text-anchor: middle;
      /* 文本水平居中 */
      dominant-baseline: middle;
      /* 文本垂直居中 */
    }
  </style>
</head>

<body>
  <div>
    <svg width="100%" height="500">
      <path d="M150 0 L75 200 L225 200 Z" />
      <text x='150' y='75'>1</text>
    </svg>
  </div>
  <div>
    <svg width="100%" height="500">
      <!-- // dominant-baseline设置文本垂直对齐方式，text-before-edge设置文本在边缘，恰好完全显示 -->
      <text dominant-baseline=text-before-edge>你好</text>
    </svg>
  </div>
  <div>
    <svg id="my-svg" class="my-svg" width="100%" height="700">
      <path d="M300,200 h-150 a150,150 0 1,0 150,-150 z" fill="red" stroke="blue" stroke-width="5" />
      <path d="M275,175 v-150 a150,150 0 0,0 -150,150 z" fill="yellow" stroke="blue" stroke-width="5" />

      <path d="M600,350 l 50,-25 
                       a25,25 -30 0,1 50,-25 l 50,-25 
                       a25,50 -30 0,1 50,-25 l 50,-25 
                       a25,75 -30 0,1 50,-25 l 50,-25 
                       a25,100 -30 0,1 50,-25 l 50,-25"
        fill="none" stroke="red" stroke-width="5" />

      <path d="M100,600 h200 a20,20,0,0,1,20,20 l0,40 a20,20,0,0,1,-20,20 h-200,0 a20,20,0,0,1,-20,-20 v0,-40 a20,20,0,0,1,20,-10 z"
        fill="none" stroke="blue" stroke-width="5"></path>






      <g class="line" id="line">
        <path fill="none" stroke="black" stroke-width="2" d="M130,140 A334,144,0,0,0,400,300" transform="translate( 0 0 )">
        </path>
        <path fill="none" stroke="black" stroke-width="2" d="M150,140 A334,144,0,0,0,400,300" transform="translate( 0 0 )">
        </path>
        <path fill="none" stroke="black" stroke-width="2" d="M170,140 A334,144,0,0,0,400,300" transform="translate( 0 0 )">
        </path>
      </g>
      <g class="node" transform="matrix( 1 0 0 1 0 0 )">
        <circle cx="130" cy="100" r="5" fill="red" />
        <circle cx="150" cy="100" r="5" fill="red" />
        <circle cx="170" cy="100" r="5" fill="red" />
        <circle cx="130" cy="140" r="5" fill="red" />
        <circle cx="150" cy="140" r="5" fill="red" />
        <circle cx="170" cy="140" r="5" fill="red" />
        <path fill="black" stroke="black" d="M100,100 h102a5,5,0,0,1,5,5v30a5,5,0,0,1,-5,5h-102a5,5,0,0,1,-5,-5v-30a5,5,0,0,1,5,-5z"></path>
        <text x='150' y='120' fill='white' dominant-baseline="middle" text-anchor="middle">
          文字内容
        </text>
      </g>
    </svg>
  </div>
</body>

</html>
